<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Observability Control</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071019;
      --panel: rgba(12, 24, 38, 0.86);
      --panel-strong: rgba(17, 34, 52, 0.96);
      --text: #eaf2ff;
      --muted: #91a3b8;
      --line: rgba(151, 172, 198, 0.2);
      --ok: #30d987;
      --ok-soft: rgba(48, 217, 135, 0.14);
      --bad: #ff6464;
      --bad-soft: rgba(255, 100, 100, 0.15);
      --wait: #ffc857;
      --wait-soft: rgba(255, 200, 87, 0.16);
      --accent: #37a3ff;
      --accent-2: #a970ff;
      --accent-3: #17d6c3;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 12%, rgba(55, 163, 255, 0.22), transparent 30%),
        radial-gradient(circle at 82% 0%, rgba(169, 112, 255, 0.18), transparent 28%),
        linear-gradient(135deg, #06101b 0%, #091826 44%, #0c1721 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 34px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(13, 31, 50, 0.92), rgba(12, 22, 35, 0.74));
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(55, 163, 255, 0.18), transparent 38%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.045) 0 1px, transparent 1px 42px);
      pointer-events: none;
    }

    header > * {
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: 0;
    }

    .subhead {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .eyebrow {
      color: var(--accent-3);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      font-weight: 700;
      margin: 0 0 8px;
      text-transform: uppercase;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button,
    .link-button {
      min-height: 38px;
      border: 1px solid rgba(151, 172, 198, 0.26);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      white-space: nowrap;
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: rgba(255, 255, 255, 0.24);
      color: #ffffff;
      box-shadow: 0 10px 22px rgba(55, 163, 255, 0.2);
    }

    button:hover,
    .link-button:hover {
      border-color: rgba(255, 255, 255, 0.42);
      transform: translateY(-1px);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0 16px;
    }

    .metric {
      background: linear-gradient(180deg, rgba(18, 36, 55, 0.94), rgba(12, 25, 40, 0.9));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: var(--shadow);
      min-height: 88px;
      position: relative;
      overflow: hidden;
    }

    .metric::after {
      content: "";
      position: absolute;
      inset: auto 14px 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-3), var(--accent-2));
      border-radius: 99px 99px 0 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 24px;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      --service: var(--accent);
      --service-soft: rgba(55, 163, 255, 0.14);
      background:
        linear-gradient(180deg, rgba(17, 34, 52, 0.96), rgba(9, 21, 34, 0.96)),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
      min-height: 238px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--service);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 92% 14%, var(--service-soft), transparent 32%);
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .card.prometheus {
      --service: #ff7a45;
      --service-soft: rgba(255, 122, 69, 0.16);
    }

    .card.grafana {
      --service: #f7b731;
      --service-soft: rgba(247, 183, 49, 0.16);
    }

    .card.loki {
      --service: #37d67a;
      --service-soft: rgba(55, 214, 122, 0.15);
    }

    .card.otel {
      --service: #8f7cff;
      --service-soft: rgba(143, 124, 255, 0.17);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: var(--service-soft);
      color: var(--service);
      border: 1px solid color-mix(in srgb, var(--service) 42%, transparent);
      flex: 0 0 auto;
      box-shadow: inset 0 0 18px var(--service-soft);
    }

    h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .service-meta {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .status {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid transparent;
      box-shadow: inset 0 0 14px rgba(255, 255, 255, 0.04);
    }

    .status.up {
      color: var(--ok);
      background: var(--ok-soft);
      border-color: #bde5cf;
    }

    .status.down {
      color: var(--bad);
      background: var(--bad-soft);
      border-color: #ffd1cb;
    }

    .status.checking {
      color: var(--wait);
      background: var(--wait-soft);
      border-color: #ffdfa1;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .detail {
      border: 1px solid rgba(151, 172, 198, 0.18);
      border-radius: 7px;
      padding: 10px;
      min-height: 64px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.035);
    }

    .detail span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .detail strong {
      display: block;
      margin-top: 5px;
      font-size: 14px;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .signal {
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      gap: 4px;
      height: 34px;
      align-items: end;
    }

    .signal span {
      display: block;
      border-radius: 3px 3px 0 0;
      min-height: 7px;
      background: linear-gradient(180deg, var(--service), color-mix(in srgb, var(--service) 45%, #071019));
      opacity: 0.32;
    }

    .card .status.up ~ * .signal span,
    .card.is-up .signal span {
      opacity: 0.88;
    }

    .card.is-down .signal span {
      background: linear-gradient(180deg, var(--bad), #5c141b);
      opacity: 0.75;
    }

    .actions {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
    }

    .footer-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 20px;
      padding-left: 2px;
    }

    @media (max-width: 860px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .summary,
      .services {
        grid-template-columns: 1fr;
      }

      .details {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <p class="eyebrow">local stack telemetry</p>
        <h1>Observability Control</h1>
        <p class="subhead">Live status and launch panel for this local stack.</p>
      </div>
      <div class="toolbar">
        <button class="primary" id="refresh" type="button">Refresh</button>
        <button id="toggleAuto" type="button">Pause Auto</button>
      </div>
    </header>

    <section class="summary" aria-label="Stack summary">
      <div class="metric">
        <span>Services Up</span>
        <strong id="upCount">0/4</strong>
      </div>
      <div class="metric">
        <span>Average Check</span>
        <strong id="avgLatency">--</strong>
      </div>
      <div class="metric">
        <span>Last Refresh</span>
        <strong id="lastRefresh">--</strong>
      </div>
      <div class="metric">
        <span>Auto Refresh</span>
        <strong id="autoState">On</strong>
      </div>
    </section>

    <section class="services" id="services" aria-label="Services"></section>

    <p class="footer-note">Prometheus uses host port 9091 because 9090 is already occupied on this machine.</p>
  </main>

  <script>
    const services = [
      {
        id: "prometheus",
        name: "Prometheus",
        mark: "P",
        port: "localhost:9091",
        statusUrl: "/status/prometheus",
        openUrl: "http://localhost:9091",
        expected: "Prometheus Server is Ready."
      },
      {
        id: "grafana",
        name: "Grafana",
        mark: "G",
        port: "localhost:3000",
        statusUrl: "/status/grafana",
        openUrl: "http://localhost:3000",
        expected: "database"
      },
      {
        id: "loki",
        name: "Loki",
        mark: "L",
        port: "localhost:3100",
        statusUrl: "/status/loki",
        openUrl: "http://localhost:3100/ready",
        expected: "ready"
      },
      {
        id: "otel",
        name: "Otel Collector",
        mark: "O",
        port: "localhost:4317 / 4318",
        statusUrl: "/status/otel",
        openUrl: "http://localhost:4318",
        expected: ""
      }
    ];

    const state = new Map();
    let autoRefresh = true;
    let timer = null;

    const servicesEl = document.getElementById("services");
    const upCountEl = document.getElementById("upCount");
    const avgLatencyEl = document.getElementById("avgLatency");
    const lastRefreshEl = document.getElementById("lastRefresh");
    const autoStateEl = document.getElementById("autoState");
    const refreshButton = document.getElementById("refresh");
    const toggleAutoButton = document.getElementById("toggleAuto");

    function renderCards() {
      servicesEl.innerHTML = services.map((service) => `
        <article class="card ${service.id}" id="card-${service.id}">
          <div class="card-head">
            <div class="title-row">
              <div class="mark">${service.mark}</div>
              <div>
                <h2>${service.name}</h2>
                <p class="service-meta">${service.port}</p>
              </div>
            </div>
            <span class="status checking" id="status-${service.id}">Checking</span>
          </div>

          <div class="details">
            <div class="detail">
              <span>Last Check</span>
              <strong id="checked-${service.id}">--</strong>
            </div>
            <div class="detail">
              <span>Latency</span>
              <strong id="latency-${service.id}">--</strong>
            </div>
            <div class="detail">
              <span>Result</span>
              <strong id="result-${service.id}">Pending</strong>
            </div>
          </div>

          <div class="signal" aria-hidden="true">
            ${Array.from({ length: 18 }, (_, index) => `<span style="height:${8 + ((index * 7) % 24)}px"></span>`).join("")}
          </div>

          <div class="actions">
            <a class="link-button" href="${service.openUrl}" target="_blank" rel="noreferrer">Open</a>
            <button type="button" data-refresh="${service.id}">Check</button>
            <button type="button" data-copy="${service.port}">Copy Endpoint</button>
          </div>
        </article>
      `).join("");
    }

    function labelTime(date) {
      return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function setServiceState(service, next) {
      state.set(service.id, next);

      const statusEl = document.getElementById(`status-${service.id}`);
      const cardEl = document.getElementById(`card-${service.id}`);
      const checkedEl = document.getElementById(`checked-${service.id}`);
      const latencyEl = document.getElementById(`latency-${service.id}`);
      const resultEl = document.getElementById(`result-${service.id}`);

      statusEl.className = `status ${next.ok ? "up" : "down"}`;
      statusEl.textContent = next.ok ? "Up" : "Down";
      cardEl.classList.toggle("is-up", next.ok);
      cardEl.classList.toggle("is-down", !next.ok);
      checkedEl.textContent = labelTime(next.checkedAt);
      latencyEl.textContent = `${next.latency} ms`;
      resultEl.textContent = next.message;
      refreshSummary();
    }

    function setChecking(service) {
      const statusEl = document.getElementById(`status-${service.id}`);
      const cardEl = document.getElementById(`card-${service.id}`);
      const resultEl = document.getElementById(`result-${service.id}`);
      statusEl.className = "status checking";
      statusEl.textContent = "Checking";
      cardEl.classList.remove("is-up", "is-down");
      resultEl.textContent = "Checking";
    }

    async function checkService(service) {
      setChecking(service);
      const started = performance.now();

      try {
        const response = await fetch(`${service.statusUrl}?t=${Date.now()}`, { cache: "no-store" });
        const text = await response.text();
        const latency = Math.round(performance.now() - started);
        const normalized = text.trim();
        const ok = response.ok && (!service.expected || normalized.includes(service.expected));

        setServiceState(service, {
          ok,
          latency,
          checkedAt: new Date(),
          message: ok ? "Healthy" : `HTTP ${response.status}`
        });
      } catch (error) {
        setServiceState(service, {
          ok: false,
          latency: Math.round(performance.now() - started),
          checkedAt: new Date(),
          message: "Unavailable"
        });
      }
    }

    async function refreshAll() {
      await Promise.all(services.map(checkService));
      lastRefreshEl.textContent = labelTime(new Date());
    }

    function refreshSummary() {
      const values = Array.from(state.values());
      const up = values.filter((item) => item.ok).length;
      const latencies = values.map((item) => item.latency).filter(Number.isFinite);
      const avg = latencies.length ? Math.round(latencies.reduce((sum, value) => sum + value, 0) / latencies.length) : null;

      upCountEl.textContent = `${up}/${services.length}`;
      avgLatencyEl.textContent = avg === null ? "--" : `${avg} ms`;
      autoStateEl.textContent = autoRefresh ? "On" : "Off";
      toggleAutoButton.textContent = autoRefresh ? "Pause Auto" : "Resume Auto";
    }

    function startTimer() {
      clearInterval(timer);
      if (autoRefresh) {
        timer = setInterval(refreshAll, 5000);
      }
      refreshSummary();
    }

    servicesEl.addEventListener("click", async (event) => {
      const refreshId = event.target.dataset.refresh;
      const copyValue = event.target.dataset.copy;

      if (refreshId) {
        const service = services.find((item) => item.id === refreshId);
        await checkService(service);
      }

      if (copyValue) {
        await navigator.clipboard.writeText(copyValue);
        event.target.textContent = "Copied";
        setTimeout(() => {
          event.target.textContent = "Copy Endpoint";
        }, 1200);
      }
    });

    refreshButton.addEventListener("click", refreshAll);
    toggleAutoButton.addEventListener("click", () => {
      autoRefresh = !autoRefresh;
      startTimer();
    });

    renderCards();
    refreshAll();
    startTimer();
  </script>
</body>
</html>
