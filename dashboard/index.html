<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Observability Control</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071019;
      --panel: rgba(12, 24, 38, 0.9);
      --text: #eaf2ff;
      --muted: #91a3b8;
      --line: rgba(151, 172, 198, 0.22);
      --ok: #30d987;
      --bad: #ff6464;
      --wait: #ffc857;
      --accent: #37a3ff;
      --accent-2: #a970ff;
      --accent-3: #17d6c3;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 12%, rgba(55, 163, 255, 0.22), transparent 30%),
        radial-gradient(circle at 82% 0%, rgba(169, 112, 255, 0.18), transparent 28%),
        linear-gradient(135deg, #06101b 0%, #091826 44%, #0c1721 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 34px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 22px;
      background: linear-gradient(135deg, rgba(13, 31, 50, 0.92), rgba(12, 22, 35, 0.74));
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(55, 163, 255, 0.18), transparent 38%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.045) 0 1px, transparent 1px 42px);
      pointer-events: none;
    }

    header > * { position: relative; z-index: 1; }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-3);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: 0;
    }

    .subhead {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .toolbar,
    .filters,
    .actions {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap;
    }

    button,
    .link-button {
      min-height: 38px;
      border: 1px solid rgba(151, 172, 198, 0.28);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      white-space: nowrap;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    button:hover,
    .link-button:hover {
      border-color: rgba(255, 255, 255, 0.45);
      transform: translateY(-1px);
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: rgba(255, 255, 255, 0.24);
      box-shadow: 0 10px 22px rgba(55, 163, 255, 0.2);
    }

    button.active {
      background: rgba(23, 214, 195, 0.15);
      border-color: rgba(23, 214, 195, 0.48);
      color: #9ff7ee;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0 16px;
    }

    .metric,
    .filterbar,
    .card {
      background: linear-gradient(180deg, rgba(18, 36, 55, 0.94), rgba(12, 25, 40, 0.9));
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric {
      min-height: 88px;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .metric::after {
      content: "";
      position: absolute;
      inset: auto 14px 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-3), var(--accent-2));
      border-radius: 99px 99px 0 0;
    }

    .metric span,
    .filterbar span,
    .detail span,
    .chart-head span,
    .chart-copy {
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 24px;
    }

    .filterbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      padding: 12px;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      --service: var(--accent);
      --service-soft: rgba(55, 163, 255, 0.14);
      padding: 18px;
      min-height: 238px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      overflow: hidden;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .card:hover {
      border-color: color-mix(in srgb, var(--service) 48%, transparent);
      box-shadow: 0 26px 76px rgba(0, 0, 0, 0.42), 0 0 0 1px var(--service-soft);
      transform: translateY(-2px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--service);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 92% 14%, var(--service-soft), transparent 32%);
      pointer-events: none;
    }

    .card > * { position: relative; z-index: 1; }
    .card.prometheus { --service: #ff7a45; --service-soft: rgba(255, 122, 69, 0.16); }
    .card.grafana { --service: #f7b731; --service-soft: rgba(247, 183, 49, 0.16); }
    .card.loki { --service: #37d67a; --service-soft: rgba(55, 214, 122, 0.15); }
    .card.otel { --service: #8f7cff; --service-soft: rgba(143, 124, 255, 0.17); }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--service-soft);
      border: 1px solid color-mix(in srgb, var(--service) 42%, transparent);
      flex: 0 0 auto;
      box-shadow: inset 0 0 18px var(--service-soft);
    }

    .mark svg {
      width: 30px;
      height: 30px;
      display: block;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .service-meta,
    .detail strong,
    .chart-badge {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .service-meta {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      word-break: break-word;
    }

    .status {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .status.up { color: var(--ok); background: rgba(48, 217, 135, 0.14); border-color: rgba(48, 217, 135, 0.45); }
    .status.down { color: var(--bad); background: rgba(255, 100, 100, 0.15); border-color: rgba(255, 100, 100, 0.45); }
    .status.checking { color: var(--wait); background: rgba(255, 200, 87, 0.16); border-color: rgba(255, 200, 87, 0.45); }

    .details {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .detail,
    .chart-widget {
      border: 1px solid rgba(151, 172, 198, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
    }

    .detail {
      padding: 10px;
      min-height: 64px;
      overflow: hidden;
    }

    .detail strong {
      display: block;
      margin-top: 5px;
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .chart-widget {
      display: grid;
      gap: 12px;
      padding: 12px;
    }

    .chart-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .chart-head strong {
      display: block;
      font-size: 15px;
      margin-top: 3px;
    }

    .chart-badge {
      min-width: 46px;
      text-align: center;
      border-radius: 999px;
      padding: 5px 8px;
      border: 1px solid color-mix(in srgb, var(--service) 44%, transparent);
      color: var(--service);
      background: var(--service-soft);
      font-size: 12px;
      font-weight: 800;
    }

    .mini-chart {
      width: 100%;
      height: 126px;
      display: block;
      overflow: visible;
      border-radius: 8px;
      background:
        linear-gradient(rgba(151, 172, 198, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(151, 172, 198, 0.08) 1px, transparent 1px);
      background-size: 100% 25%, 12.5% 100%;
    }

    .mini-chart .axis { stroke: rgba(222, 235, 255, 0.34); stroke-width: 1.5; }
    .mini-chart .grid { stroke: rgba(222, 235, 255, 0.12); stroke-width: 1; }
    .mini-chart .line {
      fill: none;
      stroke: var(--service);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px var(--service));
    }
    .mini-chart .line.alt { stroke: var(--accent-2); }
    .mini-chart .line.warn { stroke: #ff6464; }
    .mini-chart .area { fill: var(--service); opacity: 0.28; }
    .mini-chart .area.alt { fill: var(--accent-2); opacity: 0.34; }
    .mini-chart .dot {
      fill: #ffffff;
      stroke: var(--service);
      stroke-width: 2;
      filter: drop-shadow(0 0 6px var(--service));
    }
    .mini-chart .node {
      fill: rgba(7, 16, 25, 0.95);
      stroke: var(--service);
      stroke-width: 2.5;
      filter: drop-shadow(0 0 7px var(--service));
    }
    .mini-chart .node.alt { stroke: var(--accent-2); }

    .chart-copy {
      display: block;
      line-height: 1.45;
    }

    .card.is-up .mini-chart .line {
      stroke-dasharray: 420;
      stroke-dashoffset: 420;
      animation: drawLine 1.4s ease forwards;
    }

    .card.is-up .mini-chart .area {
      animation: glowArea 2.6s ease-in-out infinite;
    }

    .card.is-up .chart-widget {
      box-shadow: inset 0 0 26px var(--service-soft);
    }

    .card.is-down .mini-chart .line,
    .card.is-down .mini-chart .node {
      stroke: var(--bad);
      filter: drop-shadow(0 0 6px var(--bad));
    }

    .card.is-down .chart-badge {
      color: var(--bad);
      border-color: rgba(255, 100, 100, 0.5);
      background: rgba(255, 100, 100, 0.15);
    }

    .card.is-down .chart-widget {
      box-shadow: inset 0 0 26px rgba(255, 100, 100, 0.15);
    }

    @keyframes drawLine { to { stroke-dashoffset: 0; } }
    @keyframes glowArea {
      0%, 100% { opacity: 0.24; }
      50% { opacity: 0.5; }
    }

    .footer-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 20px;
      padding-left: 2px;
    }

    @media (max-width: 860px) {
      header,
      .filterbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .summary,
      .services,
      .details {
        grid-template-columns: 1fr;
      }

      .mini-chart { height: 112px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <p class="eyebrow">local stack telemetry</p>
        <h1>Observability Control</h1>
        <p class="subhead">Live status and launch panel for this local stack.</p>
      </div>
      <div class="toolbar">
        <button class="primary" id="refresh" type="button">Refresh</button>
        <button id="toggleAuto" type="button">Pause Auto</button>
      </div>
    </header>

    <section class="summary" aria-label="Stack summary">
      <div class="metric"><span>Services Up</span><strong id="upCount">0/4</strong></div>
      <div class="metric"><span>Average Check</span><strong id="avgLatency">--</strong></div>
      <div class="metric"><span>Last Refresh</span><strong id="lastRefresh">--</strong></div>
      <div class="metric"><span>Auto Refresh</span><strong id="autoState">On</strong></div>
    </section>

    <section class="filterbar" aria-label="Service filters">
      <span>Quick focus</span>
      <div class="filters">
        <button class="active" type="button" data-filter="all">All Services</button>
        <button type="button" data-filter="up">Healthy</button>
        <button type="button" data-filter="down">Needs Attention</button>
      </div>
    </section>

    <section class="services" id="services" aria-label="Services"></section>

    <p class="footer-note">Prometheus uses host port 9091 because 9090 is already occupied on this machine.</p>
  </main>

  <script>
    const services = [
      { id: "prometheus", name: "Prometheus", port: "localhost:9091", statusUrl: "/status/prometheus", openUrl: "http://localhost:9091", expected: "Prometheus Server is Ready." },
      { id: "grafana", name: "Grafana", port: "localhost:3000", statusUrl: "/status/grafana", openUrl: "http://localhost:3000", expected: "database" },
      { id: "loki", name: "Loki", port: "localhost:3100", statusUrl: "/status/loki", openUrl: "http://localhost:3100/ready", expected: "ready" },
      { id: "otel", name: "Otel Collector", port: "localhost:4317 / 4318", statusUrl: "/status/otel", openUrl: "http://localhost:4318", expected: "" }
    ];

    const state = new Map();
    let autoRefresh = true;
    let timer = null;
    let activeFilter = "all";

    const servicesEl = document.getElementById("services");
    const upCountEl = document.getElementById("upCount");
    const avgLatencyEl = document.getElementById("avgLatency");
    const lastRefreshEl = document.getElementById("lastRefresh");
    const autoStateEl = document.getElementById("autoState");
    const refreshButton = document.getElementById("refresh");
    const toggleAutoButton = document.getElementById("toggleAuto");
    const filterButtons = document.querySelectorAll("[data-filter]");

    function serviceLogo(id) {
      const logos = {
        prometheus: `<svg viewBox="0 0 64 64" role="img" aria-label="Prometheus logo"><circle cx="32" cy="32" r="28" fill="#ff7a45"/><path d="M32 12c5 7 7 13 4 19 4-2 7-6 8-11 6 10 2 22-8 26v5h-8v-5c-10-4-14-16-8-26 1 5 4 9 8 11-3-6-1-12 4-19z" fill="#fff"/><path d="M24 52h16" stroke="#fff" stroke-width="4" stroke-linecap="round"/></svg>`,
        grafana: `<svg viewBox="0 0 64 64" role="img" aria-label="Grafana logo"><circle cx="32" cy="32" r="28" fill="#f7b731"/><path d="M42 28c0-8-8-13-16-10-9 4-11 17-2 23 8 6 20 0 19-10-.6-6-7-9-12-6-5 3-5 10 0 12 4 2 8-1 8-5" fill="none" stroke="#08111c" stroke-width="5" stroke-linecap="round"/><circle cx="44" cy="20" r="4" fill="#08111c"/></svg>`,
        loki: `<svg viewBox="0 0 64 64" role="img" aria-label="Loki logo"><rect x="9" y="9" width="46" height="46" rx="14" fill="#37d67a"/><path d="M18 42V20h8v15h19v7H18z" fill="#06101b"/><path d="M39 18l7 7-7 7" fill="none" stroke="#06101b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
        otel: `<svg viewBox="0 0 64 64" role="img" aria-label="OpenTelemetry logo"><path d="M32 6l23 13v26L32 58 9 45V19L32 6z" fill="#8f7cff"/><path d="M32 16l14 8v16l-14 8-14-8V24l14-8z" fill="#06101b"/><path d="M32 22l9 5v10l-9 5-9-5V27l9-5z" fill="#8f7cff"/></svg>`
      };
      return logos[id] || "";
    }

    function serviceChart(id) {
      const charts = {
        prometheus: `<svg class="mini-chart" viewBox="0 0 320 126" role="img" aria-label="Prometheus scrape trend"><defs><linearGradient id="prom-area" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#ff7a45" stop-opacity="0.65"/><stop offset="100%" stop-color="#ff7a45" stop-opacity="0.02"/></linearGradient></defs><path class="grid" d="M20 24H302M20 55H302M20 86H302"/><path class="axis" d="M20 12V108H306"/><path class="area" fill="url(#prom-area)" d="M20 86L42 64L62 75L82 42L104 82L126 52L146 68L166 28L188 76L210 36L232 54L254 31L276 58L300 22V108H20Z"/><path class="line" d="M20 86L42 64L62 75L82 42L104 82L126 52L146 68L166 28L188 76L210 36L232 54L254 31L276 58L300 22"/><circle class="dot" cx="166" cy="28" r="4"/><circle class="dot" cx="300" cy="22" r="4"/></svg>`,
        grafana: `<svg class="mini-chart" viewBox="0 0 320 126" role="img" aria-label="Grafana dashboard trend"><path class="grid" d="M20 28H302M20 60H302M20 92H302"/><path class="axis" d="M20 12V108H306"/><path class="line" d="M26 84L54 70L82 78L110 40L138 52L166 34L194 68L222 50L250 38L282 54"/><path class="line alt" d="M26 96L54 86L82 58L110 70L138 46L166 78L194 44L222 72L250 58L282 32"/><path class="line warn" d="M26 52L54 66L82 36L110 72L138 62L166 82L194 54L222 60L250 76L282 48"/><circle class="dot" cx="110" cy="40" r="4"/><circle class="dot" cx="194" cy="44" r="4"/></svg>`,
        loki: `<svg class="mini-chart" viewBox="0 0 320 126" role="img" aria-label="Loki log volume"><defs><linearGradient id="loki-purple" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#a970ff" stop-opacity="0.82"/><stop offset="100%" stop-color="#37d67a" stop-opacity="0.06"/></linearGradient></defs><path class="grid" d="M20 28H302M20 60H302M20 92H302"/><path class="axis" d="M20 12V108H306"/><path class="area alt" fill="url(#loki-purple)" d="M20 92C34 84 42 62 54 64C70 67 72 96 88 96C106 96 106 36 124 34C142 32 148 88 166 84C184 80 184 48 202 46C224 43 226 86 246 86C266 86 268 52 286 54C298 56 304 70 306 82V108H20Z"/><path class="line alt" d="M20 92C34 84 42 62 54 64C70 67 72 96 88 96C106 96 106 36 124 34C142 32 148 88 166 84C184 80 184 48 202 46C224 43 226 86 246 86C266 86 268 52 286 54C298 56 304 70 306 82"/><circle class="dot" cx="124" cy="34" r="4"/><circle class="dot" cx="286" cy="54" r="4"/></svg>`,
        otel: `<svg class="mini-chart" viewBox="0 0 320 126" role="img" aria-label="OpenTelemetry trace flow"><path class="grid" d="M20 28H302M20 60H302M20 92H302"/><path class="axis" d="M20 12V108H306"/><path class="line" d="M42 92C74 42 96 44 128 78S186 88 218 38S270 46 292 72"/><path class="line alt" d="M42 96C76 96 84 72 112 64S154 42 178 58S214 94 246 70S276 38 292 36"/><circle class="node" cx="42" cy="92" r="5"/><circle class="node alt" cx="92" cy="52" r="5"/><circle class="node" cx="128" cy="78" r="5"/><circle class="node alt" cx="178" cy="58" r="5"/><circle class="node" cx="218" cy="38" r="5"/><circle class="node alt" cx="292" cy="72" r="5"/></svg>`
      };
      return charts[id] || charts.prometheus;
    }

    function chartWidget(service) {
      return `<div class="chart-widget"><div class="chart-head"><div><span>${service.name} telemetry</span><strong id="probe-${service.id}">Waiting for first check</strong></div><div class="chart-badge" id="core-${service.id}">--</div></div>${serviceChart(service.id)}<small class="chart-copy">Auto-refresh runs every 5 seconds. Use Run Check for an immediate probe.</small></div>`;
    }

    function renderCards() {
      servicesEl.innerHTML = services.map((service) => `
        <article class="card ${service.id}" id="card-${service.id}">
          <div class="card-head">
            <div class="title-row">
              <div class="mark">${serviceLogo(service.id)}</div>
              <div><h2>${service.name}</h2><p class="service-meta">${service.port}</p></div>
            </div>
            <span class="status checking" id="status-${service.id}">Checking</span>
          </div>
          <div class="details">
            <div class="detail"><span>Last Check</span><strong id="checked-${service.id}">--</strong></div>
            <div class="detail"><span>Latency</span><strong id="latency-${service.id}">--</strong></div>
            <div class="detail"><span>Result</span><strong id="result-${service.id}">Pending</strong></div>
          </div>
          ${chartWidget(service)}
          <div class="actions">
            <a class="link-button" href="${service.openUrl}" target="_blank" rel="noreferrer">Open Console</a>
            <button type="button" data-refresh="${service.id}">Run Check</button>
            <button type="button" data-copy="${service.port}">Copy URL</button>
          </div>
        </article>
      `).join("");
    }

    function labelTime(date) {
      return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function setServiceState(service, next) {
      state.set(service.id, next);
      const statusEl = document.getElementById(`status-${service.id}`);
      const cardEl = document.getElementById(`card-${service.id}`);
      const checkedEl = document.getElementById(`checked-${service.id}`);
      const latencyEl = document.getElementById(`latency-${service.id}`);
      const resultEl = document.getElementById(`result-${service.id}`);
      const coreEl = document.getElementById(`core-${service.id}`);
      const probeEl = document.getElementById(`probe-${service.id}`);

      statusEl.className = `status ${next.ok ? "up" : "down"}`;
      statusEl.textContent = next.ok ? "Up" : "Down";
      cardEl.classList.toggle("is-up", next.ok);
      cardEl.classList.toggle("is-down", !next.ok);
      cardEl.dataset.state = next.ok ? "up" : "down";
      checkedEl.textContent = labelTime(next.checkedAt);
      latencyEl.textContent = `${next.latency} ms`;
      resultEl.textContent = next.message;
      coreEl.textContent = next.ok ? "OK" : "ERR";
      probeEl.textContent = next.ok ? `${service.name} is responding in ${next.latency} ms` : `${service.name} needs attention`;
      refreshSummary();
      applyFilter();
    }

    function setChecking(service) {
      const statusEl = document.getElementById(`status-${service.id}`);
      const cardEl = document.getElementById(`card-${service.id}`);
      const resultEl = document.getElementById(`result-${service.id}`);
      const coreEl = document.getElementById(`core-${service.id}`);
      const probeEl = document.getElementById(`probe-${service.id}`);
      statusEl.className = "status checking";
      statusEl.textContent = "Checking";
      cardEl.classList.remove("is-up", "is-down");
      cardEl.dataset.state = "checking";
      resultEl.textContent = "Checking";
      coreEl.textContent = "...";
      probeEl.textContent = `Checking ${service.name}`;
    }

    async function checkService(service) {
      setChecking(service);
      const started = performance.now();
      try {
        const response = await fetch(`${service.statusUrl}?t=${Date.now()}`, { cache: "no-store" });
        const text = await response.text();
        const latency = Math.round(performance.now() - started);
        const normalized = text.trim();
        const ok = response.ok && (!service.expected || normalized.includes(service.expected));
        setServiceState(service, { ok, latency, checkedAt: new Date(), message: ok ? "Healthy" : `HTTP ${response.status}` });
      } catch (error) {
        setServiceState(service, { ok: false, latency: Math.round(performance.now() - started), checkedAt: new Date(), message: "Unavailable" });
      }
    }

    async function refreshAll() {
      await Promise.all(services.map(checkService));
      lastRefreshEl.textContent = labelTime(new Date());
    }

    function refreshSummary() {
      const values = Array.from(state.values());
      const up = values.filter((item) => item.ok).length;
      const latencies = values.map((item) => item.latency).filter(Number.isFinite);
      const avg = latencies.length ? Math.round(latencies.reduce((sum, value) => sum + value, 0) / latencies.length) : null;
      upCountEl.textContent = `${up}/${services.length}`;
      avgLatencyEl.textContent = avg === null ? "--" : `${avg} ms`;
      autoStateEl.textContent = autoRefresh ? "On" : "Off";
      toggleAutoButton.textContent = autoRefresh ? "Pause Auto" : "Resume Auto";
    }

    function applyFilter() {
      document.querySelectorAll(".card").forEach((card) => {
        const stateName = card.dataset.state || "checking";
        card.hidden = !(activeFilter === "all" || stateName === activeFilter);
      });
      filterButtons.forEach((button) => button.classList.toggle("active", button.dataset.filter === activeFilter));
    }

    function startTimer() {
      clearInterval(timer);
      if (autoRefresh) timer = setInterval(refreshAll, 5000);
      refreshSummary();
    }

    servicesEl.addEventListener("click", async (event) => {
      const refreshId = event.target.dataset.refresh;
      const copyValue = event.target.dataset.copy;
      if (refreshId) await checkService(services.find((item) => item.id === refreshId));
      if (copyValue) {
        await navigator.clipboard.writeText(copyValue);
        event.target.textContent = "Copied";
        setTimeout(() => { event.target.textContent = "Copy URL"; }, 1200);
      }
    });

    refreshButton.addEventListener("click", refreshAll);
    toggleAutoButton.addEventListener("click", () => {
      autoRefresh = !autoRefresh;
      startTimer();
    });
    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        applyFilter();
      });
    });

    renderCards();
    applyFilter();
    refreshAll();
    startTimer();
  </script>
</body>
</html>
