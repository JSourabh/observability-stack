server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    try_files /index.html =404;
  }

  location = /status/prometheus {
    proxy_pass http://prometheus:9090/-/ready;
  }

  location = /status/grafana {
    proxy_pass http://grafana:3000/api/health;
  }

  location = /status/loki {
    proxy_pass http://loki:3100/ready;
  }

  location = /status/otel {
    proxy_pass http://otel-collector:8889/metrics;
  }
}
